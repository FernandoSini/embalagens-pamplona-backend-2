#migrations
#spring.flyway.url=jdbc://
spring.flyway.schemas=embalagenspamplona
spring.flyway.user=root
spring.flyway.password=root1234
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-version=1

#swagger
springdoc.swagger-ui.path=/swagger
springdoc.swagger-ui.enabled=true
springdoc.api-docs.path=/api/docs
springdoc.paths-to-match="/api/**"
springdoc.swagger-ui.default-models-expand-depth=1
springdoc.swagger-ui.deep-linking=false
spring.config.import=optional:file:.env

##definindo o diretorio de upload de arquivos
file.upload-dir=/uploads
#definindo como ler os arquivos binarios no server
spring.servlet.multipart.enabled=true
#definindo o tamanho do arquivo qu e será enviado (por exemplo 2kb a partir disso sera armazenado no disco)

spring.servlet.multipart.file-size-threshold=2KB
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=215MB
spring.security.user.name=root
spring.security.user.password=root
spring.jackson.default-property-inclusion=non_null
jwt.key={$JWT_KEY}
jwt.access-token-expiration=3600000
jwt.refresh-token-expiration=864000000
security.cookies=true
security.cookiesMaxAge=0

#pagarme - gateway de pagamento
pagarme.secret-key=${PAGARME_SECRET_KEY}
pagarme.public-key=${PAGARME_PUBLIC_KEY}
pagarme.base-url=https://api.pagar.me/core/v5
pagarme.webhook-secret=${PAGARME_WEBHOOK_SECRET}
pagarme.pix-expiration-seconds=52800
pagarme.boleto-due-days=3